{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="form-card">
  <h2>Reset Password</h2>
  <p class="sub">Enter your email and we'll send you a reset link.</p>
  <form method="POST">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
    </div>
    <button type="submit" class="btn btn-primary btn-block">
      <i class="fas fa-paper-plane"></i> Send Reset Link
    </button>
  </form>
  <p style="text-align:center;margin-top:20px;font-size:.88rem;color:var(--gray-500);">
    <a href="{{ url_for('login') }}" style="color:var(--gold);">Back to Login</a>
  </p>
</div>
{% endblock %}
